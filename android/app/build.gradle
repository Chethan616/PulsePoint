plugins {
    id "com.android.application"
    id 'com.google.gms.google-services' // Ensure this is applied for Firebase
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace = "com.example.pulsepoint_v2"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        applicationId = "com.example.pulsepoint_v2"
        multiDexEnabled true
        minSdk = 23  // Make sure your minSdk is set properly
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    buildTypes {
        release {
            signingConfig = signingConfigs.debug // Ensure proper signing for release
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
    // Other dependencies you have
    implementation 'com.google.firebase:firebase-messaging:23.0.0' // Add this for FCM
}
